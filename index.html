<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AdminPulse – Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { min-height: 100vh; background: linear-gradient(135deg, #1a0533, #3b0f75, #6c22bd); display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-card { background: rgba(255,255,255,0.07); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo .icon { width: 56px; height: 56px; background: linear-gradient(135deg, #a855f7, #7c3aed); border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; font-size: 26px; margin-bottom: 12px; }
    .logo h1 { color: #fff; font-size: 22px; font-weight: 700; }
    .logo p { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 4px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 7px; }
    .form-group input { width: 100%; padding: 13px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; color: #fff; font-size: 14px; outline: none; transition: border 0.3s; }
    .form-group input::placeholder { color: rgba(255,255,255,0.3); }
    .form-group input:focus { border-color: #a855f7; background: rgba(168,85,247,0.1); }
    .forgot { text-align: right; margin-top: -10px; margin-bottom: 22px; }
    .forgot a { color: #c084fc; font-size: 12px; text-decoration: none; }
    .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, #a855f7, #7c3aed); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; letter-spacing: 0.5px; }
    .error-msg { display: none; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); color: #fca5a5; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; text-align: center; }
    .footer-text { text-align: center; color: rgba(255,255,255,0.35); font-size: 12px; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="icon">⚡</div>
      <h1>AdminPulse</h1>
      <p>Sign in to your dashboard</p>
    </div>
    <div class="error-msg" id="errorMsg">⚠️ Invalid email or password.</div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <div class="forgot"><a href="#">Forgot password?</a></div>
    <button class="btn-login" onclick="handleLogin()">Sign In</button>
    <div class="footer-text">No account? <a href="#" style="color:#c084fc;">Contact Admin</a></div>
  </div>
  <script>
    function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      if (!email || !password) { errorMsg.style.display = 'block'; errorMsg.textContent = '⚠️ Please fill in all fields.'; return; }
      if (email === 'admin@example.com' && password === 'admin123') { errorMsg.style.display = 'none'; window.location.href = 'dashboard.html'; }
      else { errorMsg.style.display = 'block'; errorMsg.textContent = '⚠️ Invalid email or password.'; }
    }
  </script>
</body>
</html>
